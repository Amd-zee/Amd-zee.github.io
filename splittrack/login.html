<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitTrack – Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body::before { display: none; }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background: black;
    }
  </style>
</head>
<body class="login-page">
  <canvas id="bg"></canvas>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-glow"></div>
      <h1 class="login-title">SplitTrack</h1>
      <p class="login-subtitle">Track. Balance. Settle.</p>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your name" autocomplete="off">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
      </div>

      <button class="login-btn" onclick="doLogin()">
        <span>Login</span>
      </button>

      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    let particles = [];
    function initParticles() {
      particles = [];
      for (let i = 0; i < 120; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2,
          dx: (Math.random() - 0.5) * 0.7,
          dy: (Math.random() - 0.5) * 0.7
        });
      }
    }
    initParticles();
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "cyan";
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener("resize", () => {
      resizeCanvas();
      initParticles();
    });
  </script>
</body>
</html>
