<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitTrack</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body::before { display: none; }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background: black;
    }
  </style>
</head>
<body class="page">
  <canvas id="bg"></canvas>
  <div class="topbar">
    <h2>SplitTrack</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="topbar-user" id="user-label"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">
    <button class="menu-btn" onclick="go('add-transaction.html')">
      <span class="icon">💸</span>
      <div>
        <div>Report a transaction</div>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:2px">Add a new expense</div>
      </div>
    </button>

    <button class="menu-btn" onclick="go('view-balance.html')">
      <span class="icon">📊</span>
      <div>
        <div>View current situation</div>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:2px">See who owes whom</div>
      </div>
    </button>

    <button class="menu-btn" onclick="go('statement.html')">
      <span class="icon">📋</span>
      <div>
        <div>Check statement</div>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:2px">Monthly transaction history</div>
      </div>
    </button>

    <button class="menu-btn" id="admin-btn" style="display:none;border-color:rgba(255,137,6,0.4)" onclick="go('edit-transaction.html')">
      <span class="icon">✏️</span>
      <div>
        <div>Edit a transaction</div>
        <div style="font-size:0.78rem;color:rgba(255,137,6,0.5);margin-top:2px">Admin only</div>
      </div>
    </button>
  </div>

  <script src="js/utils.js"></script>
  <script>
    const user = getUser();
    if (!user) window.location.href = 'index.html';
    document.getElementById('user-label').textContent = user.username;
    if (user.role === 'admin') {
      document.getElementById('admin-btn').style.display = 'flex';
    }
    function go(page) { window.location.href = page; }
  </script>
  <script>
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    let particles = [];
    function initParticles() {
      particles = [];
      for (let i = 0; i < 120; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2,
          dx: (Math.random() - 0.5) * 0.7,
          dy: (Math.random() - 0.5) * 0.7
        });
      }
    }
    initParticles();
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "cyan";
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener("resize", () => { resizeCanvas(); initParticles(); });
  </script>
</body>
</html>
