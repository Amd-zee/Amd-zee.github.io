<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitTrack</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="page" style="background:black;">

<!-- 🔥 Background -->
<canvas id="bg"></canvas>

<!-- Topbar -->
<div class="topbar">
  <h2>SplitTrack</h2>

  <div style="display:flex;align-items:center;gap:12px">
    <span class="topbar-user" id="user-label"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Main Content -->
<div class="content">

  <button class="menu-btn" onclick="go('add-transaction.html')">
    <span class="icon">💸</span>
    <div>
      <div>Report a transaction</div>
      <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:2px">
        Add a new expense
      </div>
    </div>
  </button>

  <button class="menu-btn" onclick="go('view-balance.html')">
    <span class="icon">📊</span>
    <div>
      <div>View current situation</div>
      <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:2px">
        See who owes whom
      </div>
    </div>
  </button>

  <button class="menu-btn" onclick="go('statement.html')">
    <span class="icon">📋</span>
    <div>
      <div>Check statement</div>
      <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:2px">
        Monthly transaction history
      </div>
    </div>
  </button>

  <!-- Admin Button -->
  <button class="menu-btn" id="admin-btn" style="display:none;border-color:rgba(255,137,6,0.4)" onclick="go('edit-transaction.html')">
    <span class="icon">✏️</span>
    <div>
      <div>Edit a transaction</div>
      <div style="font-size:0.78rem;color:rgba(255,137,6,0.5);margin-top:2px">
        Admin only
      </div>
    </div>
  </button>

</div>

<!-- Scripts -->
<script src="js/utils.js"></script>

<script>
const user = getUser();

if (!user) {
  window.location.href = "index.html";
}

document.getElementById("user-label").textContent = user.username;

if (user.role === "admin") {
  document.getElementById("admin-btn").style.display = "flex";
}

function go(page) {
  window.location.href = page;
}
</script>

<!-- 🔥 3D BLACK BACKGROUND -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * 200,
    dx: (Math.random() - 0.4),
    dy: (Math.random() - 0.4)
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

    let size = (p.z / 200) * 2;

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
window.addEventListener("resize", resize);
</script>

</body>
</html>
