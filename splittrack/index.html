<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitTrack – Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-glow"></div>
      <h1 class="login-title">SplitTrack</h1>
      <p class="login-subtitle">Track. Balance. Settle.</p>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your name" autocomplete="off">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
      </div>

      <button class="login-btn" onclick="doLogin()">
        <span>Login</span>
      </button>

      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
