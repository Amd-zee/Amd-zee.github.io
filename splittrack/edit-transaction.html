<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Transaction</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
  <div class="topbar">
    <button class="logout-btn" onclick="history.back()">← Back</button>
    <h2>Edit Transaction</h2>
    <span class="topbar-user" style="color:var(--accent3);font-size:0.78rem">Admin</span>
  </div>

  <div class="content">

    <!-- Month selector -->
    <div id="month-select">
      <span class="step-label">Select month to edit</span>
      <button class="btn" id="btn-current" onclick="loadMonth(0)"></button>
      <button class="btn" id="btn-prev"    onclick="loadMonth(1)"></button>
    </div>

    <!-- Edit list -->
    <div id="edit-view" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button class="logout-btn" onclick="backToSelect()">← Months</button>
        <h3 id="edit-title" style="font-size:1rem;font-weight:600"></h3>
        <span></span>
      </div>

      <div id="tx-list"></div>

      <div id="no-data" style="display:none;text-align:center;color:var(--text-muted);padding:32px 0">
        No transactions this month
      </div>
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script>
    const user = getUser();
    if (!user || user.role !== 'admin') window.location.href = 'index.html';

    const now = new Date();
    function monthLabel(offset) {
      const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
      return d.toLocaleDateString('en-PK', { month: 'long', year: 'numeric' });
    }
    function monthKey(offset) {
      const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    document.getElementById('btn-current').textContent = monthLabel(0) + ' (Current)';
    document.getElementById('btn-prev').textContent    = monthLabel(1) + ' (Previous)';

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-PK', { day:'2-digit', month:'short', year:'numeric' });
    }

    async function loadMonth(offset) {
      const key = monthKey(offset);
      document.getElementById('month-select').style.display = 'none';
      document.getElementById('edit-view').style.display    = 'block';
      document.getElementById('edit-title').textContent     = monthLabel(offset);
      document.getElementById('tx-list').innerHTML          =
        '<div style="text-align:center;color:var(--text-muted);padding:20px">Loading…</div>';

      try {
        const data = await apiFetch(`/transactions/month/${key}`);
        const txs  = data.transactions;
        const list = document.getElementById('tx-list');

        if (!txs || txs.length === 0) {
          list.innerHTML = '';
          document.getElementById('no-data').style.display = 'block';
          return;
        }

        document.getElementById('no-data').style.display = 'none';
        list.innerHTML = txs.map(tx => `
          <div class="glass-card" style="margin-bottom:12px;padding:16px 18px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
              <div>
                <div style="font-weight:600;font-size:0.95rem">${tx.description}</div>
                <div style="font-size:0.78rem;color:var(--text-muted);margin-top:2px">${fmtDate(tx.date)} &nbsp;·&nbsp; Paid by <span class="tag ${tx.paid_by.toLowerCase()}">${tx.paid_by}</span></div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">Reported by: ${tx.reported_by}</div>
              </div>
              <div style="font-size:1.1rem;font-weight:700;color:var(--accent3)">
                PKR ${parseFloat(tx.amount).toLocaleString()}
              </div>
            </div>
            <div class="edit-row">
              <input type="number" class="edit-input" id="inp-${tx.id}" value="${tx.amount}" min="0" step="any" placeholder="New amount">
              <button class="edit-save" onclick="saveEdit(${tx.id})">Save</button>
              <span id="status-${tx.id}" style="font-size:0.78rem;color:var(--text-muted)"></span>
            </div>
          </div>
        `).join('');

      } catch (err) {
        document.getElementById('tx-list').innerHTML =
          `<div style="text-align:center;color:var(--danger);padding:20px">${err.message}</div>`;
      }
    }

    async function saveEdit(id) {
      const inp    = document.getElementById(`inp-${id}`);
      const status = document.getElementById(`status-${id}`);
      const amount = parseFloat(inp.value);

      if (isNaN(amount) || amount < 0) {
        status.textContent = '⚠️ Invalid amount';
        status.style.color = 'var(--danger)';
        return;
      }

      status.textContent = 'Saving…';
      status.style.color = 'var(--text-muted)';

      try {
        await apiFetch(`/transactions/edit/${id}`, {
          method: 'PUT',
          body: { amount },
        });
        status.textContent = '✅ Saved';
        status.style.color = '#2cb67d';
        showToast('✅ Transaction updated');
      } catch (err) {
        status.textContent = '❌ ' + err.message;
        status.style.color = 'var(--danger)';
      }
    }

    function backToSelect() {
      document.getElementById('edit-view').style.display    = 'none';
      document.getElementById('month-select').style.display = 'block';
    }
  </script>
</body>
</html>
