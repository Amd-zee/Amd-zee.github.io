<!DOCTYPE html>
<html>
<head>
  <title>Ahmad Zeeshan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .box {
      text-align: center;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border: 2px solid cyan;
      color: cyan;
      text-decoration: none;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">
  <h1>Ahmad Zeeshan</h1>
  <a href="/SplitTrack/">Open Split Track</a>
</div>

<script>
const c = document.getElementById("bg");
const x = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let p = Array.from({length:100},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  dx:Math.random()-0.5,
  dy:Math.random()-0.5
}));

function a(){
  x.clearRect(0,0,c.width,c.height);
  p.forEach(o=>{
    o.x+=o.dx; o.y+=o.dy;
    x.beginPath();
    x.arc(o.x,o.y,2,0,6.28);
    x.fillStyle="cyan";
    x.fill();
  });
  requestAnimationFrame(a);
}
a();
</script>

</body>
</html>
